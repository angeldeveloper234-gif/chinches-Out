  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              green: '#2D8C3C',
              darkGreen: '#1a5424',
              yellow: '#FBC02D',
              dark: '#212121',
              gray: '#F3F4F6',
              white: '#FFFFFF',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          boxShadow: {
            'soft': '0 20px 40px -15px rgba(45, 140, 60, 0.15)',

          }
        }
      }
    }

  <style>
    /* Custom scrollbar for a premium feel */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #2D8C3C;
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #1a5424;
    }

    /* Infinite Scroll Animation */
    @keyframes scroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    .animate-scroll {
      animation: scroll 80s linear infinite;
    }

    .animate-scroll:hover {
      animation-play-state: paused;
    }
  </style>
